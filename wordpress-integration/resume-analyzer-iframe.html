<!-- Resume Analyzer Pro - WordPress Integration -->
<!-- Add this to your WordPress page via Custom HTML block or shortcode -->
<!-- NOTE: WordPress page URL must have ?context=<JWT_TOKEN> parameter -->

<div id="resume-analyzer-container" style="width: 100%; min-height: 1200px;">
  <iframe
    id="resumeAnalyzerFrame"
    src="https://resume-analyzer-pro-v2.netlify.app/"
    width="100%"
    height="1200"
    frameborder="0"
    style="border: none; border-radius: 8px;"
    title="Resume Analyzer PRO">
  </iframe>
</div>

<script>
(function() {
  console.log('🚀 Initializing Resume Analyzer PRO...');

  // Get context parameter from current page URL
  const urlParams = new URLSearchParams(window.location.search);
  const contextToken = urlParams.get('context');

  console.log('🔍 Context token found:', contextToken ? 'YES' : 'NO');

  // If context exists, pass it to the iframe
  if (contextToken) {
    const iframe = document.getElementById('resumeAnalyzerFrame');
    const iframeSrc = 'https://resume-analyzer-pro-v2.netlify.app/?context=' + encodeURIComponent(contextToken);

    console.log('📍 Setting iframe URL with context token');
    iframe.src = iframeSrc;

    console.log('✅ Resume Analyzer PRO initialized with authentication!');
  } else {
    console.warn('⚠️ No context token found in URL. Tool will run in anonymous mode.');
    console.warn('💡 To enable user authentication and session features, add ?context=<JWT_TOKEN> to page URL');
  }
})();
</script>
